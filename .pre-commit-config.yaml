repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: ruff check --fix
        language: system
        types_or: [python, pyi, jupyter]

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types_or: [python, pyi, jupyter]

      - id: pyright
        name: pyright
        entry: pyright
        language: system
        pass_filenames: false
        types_or: [python, pyi]
