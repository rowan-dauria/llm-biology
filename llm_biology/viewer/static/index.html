<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=1100, initial-scale=1">
<title>Biology Attribution Graphs</title>

<link rel="stylesheet" href="/ct/style.css">
<link rel="stylesheet" href="/ct/attribution_graph/cg.css">
<link rel="stylesheet" href="/ct/attribution_graph/gridsnap/gridsnap.css">
<link rel="stylesheet" href="/ct/feature_examples/feature-examples.css">
<link rel="stylesheet" href="/biology-server.css">

<main class="viewer-shell">
  <section class="viewer-toolbar">
    <label>
      Graph
      <select id="graph-select"></select>
    </label>
    <label>
      Upload slug
      <input id="slug" type="text" placeholder="auto">
    </label>
    <label>
      Graph JSON
      <input id="upload-file" type="file" accept=".json,application/json">
    </label>
    <button id="upload-button" type="button" disabled>Upload</button>
    <div class="status-line" id="status">Loading graphs...</div>
  </section>

  <div class="tooltip tooltip-hidden"></div>
  <div class="nav"></div>
  <section id="graph" class="cg"></section>
</main>

<script src="https://transformer-circuits.pub/2025/attribution-graphs/static_js/lib/d3.js"></script>

<script src="/ct/util.js"></script>

<script src="/ct/attribution_graph/render-act-histogram.js"></script>
<script src="/ct/attribution_graph/gridsnap/init-gridsnap.js"></script>
<script src="/ct/attribution_graph/init-cg-button-container.js"></script>
<script src="/ct/attribution_graph/init-cg-link-graph.js"></script>
<script src="/ct/attribution_graph/init-cg-node-connections.js"></script>
<script src="/ct/attribution_graph/init-cg-clerp-list.js"></script>
<script src="/ct/attribution_graph/init-cg-feature-detail.js"></script>
